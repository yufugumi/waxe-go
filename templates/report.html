<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.TestName}} accessibility report {{.Date}}</title>
    <style>
      body {
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
        font-family: system-ui, sans-serif;
      }
      .violation {
        border-left: 4px solid #ff4444;
        margin: 20px 0;
        padding: 10px;
      }
      code {
        background: #f5f5f5;
        padding: 8px;
        display: block;
        overflow-x: auto;
      }
      .no-violations {
        color: green;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>{{.TestName}} accessibility report - {{.Date}}</h1>
    {{range .Results}}{{if .Violations}}
    <section>
      <h2>{{.URL}}</h2>
      {{range .Violations}}
      <div class="violation">
        <h3>{{.ID}}: {{.Help}}</h3>
        <p>Impact: {{.Impact}}</p>
        <p>{{.Description}}</p>
        {{if .Nodes}}
        <h4>HTML Location:</h4>
        <code>{{(index .Nodes 0).HTML}}</code>
        {{end}}
      </div>
      {{end}}
    </section>
    {{else}}{{end}}{{end}}
  </body>
</html>
