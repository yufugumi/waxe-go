name: Monthly accessibility scans

env:
  SCAN_TIMESTAMP: ${{ github.run_id }}-${{ github.run_number }}
  VISITOR_PASSWORD: ${{ secrets.VISITOR_PASSWORD }}

on:
  schedule:
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      scan_filter:
        description: "Which scan(s) to run? (all, wellington, letstalk, archives, transportprojects, careers)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - wellington
          - letstalk
          - archives
          - transportprojects
          - careers

jobs:
  accessibility-scan:
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 800
    if: ${{ github.event.inputs.scan_filter == 'all' || github.event.inputs.scan_filter == matrix.site || github.event_name == 'schedule' }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - site: wellington
            sitemap_url: https://wellington.govt.nz/sitemap.xml
            url_file: urls/wellington.txt
            commit_message: "Update wellington.govt.nz URL list"
            artifact_name: wellington-a11y-reports
            artifact_path: reports/accessibility-report-wellington-govt-nz-*.html
            runner: blacksmith-8vcpu-ubuntu-2204
            max_urls: ""
            fallback_urls: ""

          - site: letstalk
            sitemap_url: https://www.letstalk.wellington.govt.nz/sitemap.xml
            url_file: urls/letstalk.txt
            commit_message: "Update letstalk.wellington.govt.nz URL list"
            artifact_name: letstalk-a11y-reports
            artifact_path: reports/accessibility-report-lets-talk-*.html
            runner: blacksmith-4vcpu-ubuntu-2204
            max_urls: ""
            fallback_urls: ""

          - site: transportprojects
            sitemap_url: https://www.transportprojects.org.nz/sitemap.xml
            url_file: urls/transportprojects.txt
            commit_message: "Update transportprojects.org.nz URL list"
            artifact_name: transportprojects-a11y-reports
            artifact_path: reports/accessibility-report-transportprojects-*.html
            runner: blacksmith-4vcpu-ubuntu-2204
            max_urls: ""
            fallback_urls: ""

          - site: archives
            sitemap_url: https://archivesonline.wcc.govt.nz/sitemap-nodes-00001.xml
            url_file: urls/archives.txt
            commit_message: "Update archivesonline.wcc.govt.nz URL list"
            artifact_name: archives-a11y-reports
            artifact_path: reports/accessibility-report-archives-online-*.html
            runner: blacksmith-4vcpu-ubuntu-2204
            max_urls: "--max 400"
            fallback_urls: |
              https://archivesonline.wcc.govt.nz/
              https://archivesonline.wcc.govt.nz/nodes/browse
              https://archivesonline.wcc.govt.nz/nodes/definesearch
              https://archivesonline.wcc.govt.nz/pages/history
              https://archivesonline.wcc.govt.nz/pages/contact
              https://archivesonline.wcc.govt.nz/pages/aboutus
              https://archivesonline.wcc.govt.nz/pages/accessstatement
              https://archivesonline.wcc.govt.nz/pages/CommunityArchive
              https://archivesonline.wcc.govt.nz/pages/help
              https://archivesonline.wcc.govt.nz/pages/property
              https://archivesonline.wcc.govt.nz/pages/Familyhistory
              https://archivesonline.wcc.govt.nz/users/register

          - site: careers
            sitemap_url: https://careers.wellington.govt.nz/sitemap.xml
            url_file: urls/careers.txt
            commit_message: "Update careers.wellington.govt.nz URL list"
            artifact_name: careers-a11y-reports
            artifact_path: reports/accessibility-report-careers-*.html
            runner: blacksmith-4vcpu-ubuntu-2204
            max_urls: "--max 400"
            fallback_urls: ""

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun packages
        id: bun-cache
        uses: useblacksmith/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Playwright
        id: playwright-cache
        uses: useblacksmith/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          bun install
          bun playwright install chromium

      - name: Generate URLs for ${{ matrix.site }}
        run: |
          if [ "${{ matrix.site }}" = "archives" ] && [ -n "${{ matrix.fallback_urls }}" ]; then
            # Special handling for archives with fallback
            bun run sitemap ${{ matrix.sitemap_url }} ${{ matrix.max_urls }} --output ${{ matrix.url_file }} || {
              echo "Sitemap generation failed, using fallback URL list"
              cat > ${{ matrix.url_file }} << 'EOF'
          ${{ matrix.fallback_urls }}
          EOF
            }
          else
            # Standard sitemap generation
            bun run sitemap ${{ matrix.sitemap_url }} ${{ matrix.max_urls }} --output ${{ matrix.url_file }}
          fi

      - name: Commit URL list updates
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          git add ${{ matrix.url_file }}
          git diff --staged --quiet || git commit -m "${{ matrix.commit_message }}"

      - name: Run ${{ matrix.site }} axe scan
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 420
          max_attempts: 2
          command: bun run scan --site=${{ matrix.site }}

      - name: Upload ${{ matrix.site }} scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SCAN_TIMESTAMP }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

      - name: Push URL list changes
        if: always()
        run: git push origin || true

  create-release:
    runs-on: ubuntu-latest
    # Run after all jobs have completed (regardless of success/failure), only on schedule
    if: ${{ always() && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.scan_filter == 'all')) }}
    needs: [accessibility-scan]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts

      - name: Display artifact structure
        run: find all-artifacts -type f | sort

      - name: Generate tag version
        id: tag_version
        run: |
          DATE=$(date +'%Y-%m-%d')
          echo "new_tag=v${DATE}" >> $GITHUB_OUTPUT
          echo "date=${DATE}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          # Create release directory
          mkdir -p release-files

          # Get current date in multiple formats to be flexible
          CURRENT_DATE_1=$(date +'%d-%m-%Y')
          CURRENT_DATE_2=$(date +'%Y-%m-%d')
          echo "Looking for files with dates: ${CURRENT_DATE_1} or ${CURRENT_DATE_2}"

          # First, copy all HTML files from artifacts (since they are accessibility reports)
          find all-artifacts -type f -name "*.html" -exec cp {} release-files/ \; || true

          # Also copy any CSV files if they exist
          find all-artifacts -type f -name "*.csv" -exec cp {} release-files/ \; || true

          # List what we're about to release
          echo "Files to be released:"
          ls -la release-files/

          # Count files
          FILE_COUNT=$(find release-files -type f | wc -l)
          echo "Total files found: ${FILE_COUNT}"

          if [ "${FILE_COUNT}" -eq 0 ]; then
            echo "No files found to release"
            echo "CREATE_RELEASE=false" >> $GITHUB_ENV
          else
            echo "CREATE_RELEASE=true" >> $GITHUB_ENV
          fi

      - name: Create a new release
        if: env.CREATE_RELEASE == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: "Monthly accessibility reports"
          body: |
            # Reports - ${{ steps.tag_version.outputs.date }}

            These reports include automated accessibility scan results for:
            - wellington.govt.nz
            - letstalk.wellington.govt.nz
            - archivesonline.wcc.govt.nz
            - transportprojects.org.nz
            - careers.wellington.govt.nz
          artifacts: "release-files/*"
          artifactErrorsFailBuild: false
          allowUpdates: true

      - name: No files to release
        if: env.CREATE_RELEASE == 'false'
        run: echo "No accessibility report files were found to create a release with."
