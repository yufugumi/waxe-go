name: Create git tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag to create, for example v1.2.3
        required: true
        type: string
      target:
        description: Branch or commit to tag
        required: true
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  create-tag:
    runs-on: ubuntu-slim
    steps:
      - name: Checkout target
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Validate version format
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if ! printf '%s\n' "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Version must be a semver tag starting with v, for example v1.2.3 or v1.2.3-rc.1" >&2
            exit 1
          fi

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists locally" >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists on origin" >&2
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        env:
          VERSION: ${{ inputs.version }}
        run: |
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "refs/tags/$VERSION"

      - name: Summarise result
        env:
          VERSION: ${{ inputs.version }}
          TARGET: ${{ inputs.target }}
          REPOSITORY: ${{ github.repository }}
        run: |
          {
            echo "Created tag $VERSION from $TARGET."
            echo "This workflow only creates the git tag. GitHub releases are published by commits to main/master."
            echo
          } >> "$GITHUB_STEP_SUMMARY"
